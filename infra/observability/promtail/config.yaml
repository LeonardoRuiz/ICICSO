server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: icicso-k8s-logs
    static_configs:
      - targets: [localhost]
        labels:
          job: icicso-k8s-logs
          __path__: /var/log/icicso/*.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            service_name: service_name
            trace_id: trace_id
            correlation_id: correlation_id
            request_id: request_id
            message: message
      - labels:
          level:
          service_name:
          trace_id:
          correlation_id:
