services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: icicso-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    ports:
      - "${OBSERVABILITY_PROMETHEUS_PORT}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - otel-collector
      - postgres-exporter
      - redis-exporter

  grafana:
    image: grafana/grafana:11.2.0
    container_name: icicso-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${OBSERVABILITY_GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${OBSERVABILITY_GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${OBSERVABILITY_GRAFANA_PORT}:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
      - tempo

  loki:
    image: grafana/loki:3.1.1
    container_name: icicso-loki
    command: -config.file=/etc/loki/config.yaml
    ports:
      - "${OBSERVABILITY_LOKI_PORT}:3100"
    volumes:
      - ./loki/config.yaml:/etc/loki/config.yaml:ro

  promtail:
    image: grafana/promtail:3.1.1
    container_name: icicso-promtail
    command: -config.file=/etc/promtail/config.yaml
    volumes:
      - ./promtail/config.yaml:/etc/promtail/config.yaml:ro
      - ../../logs/observability:/var/log/icicso:ro
    depends_on:
      - loki

  tempo:
    image: grafana/tempo:2.6.1
    container_name: icicso-tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    ports:
      - "${OBSERVABILITY_TEMPO_PORT}:3200"
      - "14317:4317"
      - "14318:4318"
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.108.0
    container_name: icicso-otel-collector
    command: ["--config=/etc/otel-collector/config.yaml"]
    ports:
      - "14417:4317"
      - "14418:4318"
      - "19464:9464"
    volumes:
      - ./otel-collector/config.yaml:/etc/otel-collector/config.yaml:ro
    depends_on:
      - tempo

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: icicso-postgres-exporter
    environment:
      DATA_SOURCE_NAME: ${OBSERVABILITY_POSTGRES_EXPORTER_DSN}
    ports:
      - "9187:9187"

  redis-exporter:
    image: oliver006/redis_exporter:v1.63.0
    container_name: icicso-redis-exporter
    environment:
      REDIS_ADDR: ${OBSERVABILITY_REDIS_EXPORTER_ADDR}
    ports:
      - "9121:9121"
