apiVersion: apps/v1
kind: Deployment
metadata:
  name: icicso-api
spec:
  replicas: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/environment: staging
    spec:
      initContainers:
        - name: db-bootstrap
          command:
            - sh
            - -lc
            - pnpm --filter @icicso/database db:push && pnpm --filter @icicso/database db:seed
      containers:
        - name: gateway-api
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 100m
              memory: 160Mi
            limits:
              cpu: 500m
              memory: 384Mi
