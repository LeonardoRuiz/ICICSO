apiVersion: apps/v1
kind: Deployment
metadata:
  name: icicso-parser
spec:
  replicas: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/environment: staging
    spec:
      containers:
        - name: ingestion-service
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 100m
              memory: 160Mi
            limits:
              cpu: 500m
              memory: 384Mi
