apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: icicso-frontend
  namespace: icicso-staging
  labels:
    app.kubernetes.io/part-of: icicso
    app.kubernetes.io/environment: staging
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/group.name: icicso-staging
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /health/ready
spec:
  rules:
    - host: staging.icicso.example.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: icicso-frontend
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: icicso-api
  namespace: icicso-staging
  labels:
    app.kubernetes.io/part-of: icicso
    app.kubernetes.io/environment: staging
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/group.name: icicso-staging
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /health/ready
    alb.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
    - host: staging.icicso.example.internal
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: icicso-api
                port:
                  number: 3100
