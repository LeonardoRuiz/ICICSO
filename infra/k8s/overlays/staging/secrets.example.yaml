apiVersion: v1
kind: Secret
metadata:
  name: icicso-app-secret
  namespace: icicso-staging
  labels:
    app.kubernetes.io/part-of: icicso
    app.kubernetes.io/environment: staging
type: Opaque
stringData:
  DATABASE_URL: postgresql://icicso:replace-with-staging-postgres-password@icicso-postgres:5432/icicso_staging
  JWT_SECRET: replace-with-staging-jwt-secret
  INTERNAL_SERVICE_TOKEN: replace-with-staging-internal-service-token
  MINIO_ACCESS_KEY: replace-with-staging-minio-access-key
  MINIO_SECRET_KEY: replace-with-staging-minio-secret-key
---
apiVersion: v1
kind: Secret
metadata:
  name: icicso-postgres-secret
  namespace: icicso-staging
  labels:
    app.kubernetes.io/part-of: icicso
    app.kubernetes.io/environment: staging
type: Opaque
stringData:
  POSTGRES_PASSWORD: replace-with-staging-postgres-password
