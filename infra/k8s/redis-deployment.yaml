apiVersion: apps/v1
kind: Deployment
metadata:
  name: icicso-redis
  namespace: icicso-local
  labels:
    app.kubernetes.io/name: icicso-redis
    app.kubernetes.io/part-of: icicso
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: icicso-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: icicso-redis
        app.kubernetes.io/part-of: icicso
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
              name: redis
          volumeMounts:
            - name: redis-data
              mountPath: /data
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: icicso-redis-data
