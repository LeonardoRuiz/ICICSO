apiVersion: apps/v1
kind: Deployment
metadata:
  name: icicso-engine
  namespace: icicso-local
  labels:
    app.kubernetes.io/name: icicso-engine
    app.kubernetes.io/part-of: icicso
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: icicso-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: icicso-engine
        app.kubernetes.io/part-of: icicso
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: icicso-app-config
            - secretRef:
                name: icicso-app-secret
          command:
            - sh
            - -lc
            - until pg_isready -h "$POSTGRES_HOST" -p "$POSTGRES_PORT" -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do echo "waiting for postgres"; sleep 2; done
        - name: db-bootstrap
          image: icicso/node-runtime:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: icicso-app-config
            - secretRef:
                name: icicso-app-secret
          command:
            - sh
            - -lc
            - pnpm --filter @icicso/database db:push && pnpm --filter @icicso/database db:seed
      containers:
        - name: auth-service
          image: icicso/node-runtime:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: icicso-app-config
            - secretRef:
                name: icicso-app-secret
          command: ["sh", "-lc", "node apps/auth-service/dist/index.js"]
          ports:
            - containerPort: 3101
              name: auth
          readinessProbe:
            httpGet:
              path: /health
              port: auth
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: auth
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 40m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 192Mi
        - name: identity-service
          image: icicso/node-runtime:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: icicso-app-config
            - secretRef:
                name: icicso-app-secret
          command: ["sh", "-lc", "node apps/identity-service/dist/index.js"]
          ports:
            - containerPort: 3102
              name: identity
          readinessProbe:
            httpGet:
              path: /health
              port: identity
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: identity
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 40m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 192Mi
