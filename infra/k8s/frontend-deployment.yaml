apiVersion: apps/v1
kind: Deployment
metadata:
  name: icicso-frontend
  namespace: icicso-local
  labels:
    app.kubernetes.io/name: icicso-frontend
    app.kubernetes.io/part-of: icicso
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: icicso-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: icicso-frontend
        app.kubernetes.io/part-of: icicso
    spec:
      containers:
        - name: frontend
          image: icicso/frontend-local:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
