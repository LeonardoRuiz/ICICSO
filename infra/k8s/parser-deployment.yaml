apiVersion: apps/v1
kind: Deployment
metadata:
  name: icicso-parser
  namespace: icicso-local
  labels:
    app.kubernetes.io/name: icicso-parser
    app.kubernetes.io/part-of: icicso
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: icicso-parser
  template:
    metadata:
      labels:
        app.kubernetes.io/name: icicso-parser
        app.kubernetes.io/part-of: icicso
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: icicso-app-config
            - secretRef:
                name: icicso-app-secret
          command:
            - sh
            - -lc
            - until pg_isready -h "$POSTGRES_HOST" -p "$POSTGRES_PORT" -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do echo "waiting for postgres"; sleep 2; done
        - name: db-bootstrap
          image: icicso/node-runtime:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: icicso-app-config
            - secretRef:
                name: icicso-app-secret
          command:
            - sh
            - -lc
            - pnpm --filter @icicso/database db:push && pnpm --filter @icicso/database db:seed
      containers:
        - name: ingestion-service
          image: icicso/node-runtime:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: icicso-app-config
            - secretRef:
                name: icicso-app-secret
          command:
            - sh
            - -lc
            - node apps/ingestion-service/dist/index.js
          ports:
            - containerPort: 3108
              name: http
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 250m
              memory: 256Mi
