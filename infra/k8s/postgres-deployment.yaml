apiVersion: apps/v1
kind: Deployment
metadata:
  name: icicso-postgres
  namespace: icicso-local
  labels:
    app.kubernetes.io/name: icicso-postgres
    app.kubernetes.io/part-of: icicso
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: icicso-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: icicso-postgres
        app.kubernetes.io/part-of: icicso
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: icicso-app-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: icicso-app-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: icicso-postgres-secret
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
              name: postgres
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - sh
                - -lc
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -lc
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: icicso-postgres-data
