// ICICSO_LEVEL_TAGGER v2
(function () {
  const levelRegex = /\bL(1[0-2]|[0-9])\b/;
  const preferredTargets = ".module-card,.continuum-node,.continuum-card,.block-card,.block-node,.workspace-card,.feed-document,.gcl-record,.slice-stage,.slice-card,.ingestion-card,.catalog-row,.catalog-card";
  const fallbackTargets = "article,section";
  const ignoredSelectors = "pre,code,textarea,script,style";

  function applyLevel(element, level) {
    if (!element || !level) return;
    const cls = "l" + level.slice(1);
    element.classList.add(cls);
    element.setAttribute("data-level", level);
  }

  function findTarget(node) {
    const preferred = node.closest(preferredTargets);
    if (preferred) return preferred;
    const fallback = node.closest(fallbackTargets);
    return fallback || node;
  }

  function scan() {
    const nodes = document.querySelectorAll("body *:not(script):not(style)");
    nodes.forEach((node) => {
      if (node.matches(ignoredSelectors)) return;
      if (node.children && node.children.length) return;
      const text = (node.textContent || "").trim();
      const match = text.match(levelRegex);
      if (!match) return;
      const level = "L" + match[1];
      const target = findTarget(node);
      applyLevel(target, level);
    });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", scan);
  } else {
    scan();
  }
})();
