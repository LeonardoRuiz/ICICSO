classification_rules:
  - No usar Acompañantes como sustituto de Area.
  - No usar Acompañantes como sustituto de Subespecialidad.
  - Permitir múltiples acompañantes por recurso cuando la relación sea real.
  - Mantener No especificado hasta revisión editorial cuando no exista trazabilidad suficiente.
  - AC-03 puede abrir diabetes, control glucémico perioperatorio, obesidad o lípidos cuando la señal sea explícita y transversal.
  - AC-11 puede usar subfamilias auxiliares de ictus, aneurismas/HSA, carotídea/revascularización, neurointervencionismo complejo y neurocríticos/neurocognición.
  - AC-09 puede absorber inmunoterapia o cardio-oncología solo cuando la señal biológica sea explícita y operativamente relevante.
  - AC-13 debe aplicarse cuando el recurso pertenece de forma explícita a oncología torácica, tumores cardíacos o cardio-oncología.
  - Las subfamilias internas de AC-03, AC-11 y AC-13 no cambian el contrato de filtros; sirven solo como capa auxiliar de lectura y trazabilidad.
