width="1" stroke-opacity="0.35"/><rect x="70" y="70" width="4820" height="3368" rx="0" fill="none" fill-opacity="1" stroke="#255e91" stroke-width="4"/><rect x="100" y="100" width="4760" height="3308" rx="0" fill="none" fill-opacity="1" stroke="#143755" stroke-width="2"/><polygon points="350.9,297.5 260.0,350.0 169.1,297.5 169.1,192.5 260.0,140.0 350.9,192.5" fill="#0a2c4e" stroke="#48d8ff" stroke-width="5"/><text x="260" y="262" fill="#48d8ff" font-family="'IBM Plex Mono', Consolas, monospace" font-size="52" font-weight="900" text-anchor="middle" letter-spacing="0.5">IC</text><text x="430" y="205" fill="#edf8ff" font-family="'IBM Plex Mono', Consolas, monospace" font-size="126" font-weight="900" text-anchor="start" letter-spacing="0.5">ICICSO</text><text x="445" y="275" fill="#48d8ff" font-family="'IBM Plex Mono', Consolas, monospace" font-size="36" font-weight="800" text-anchor="start" letter-spacing="0.5">INSTITUTIONAL COGNITIVE INFRASTRUCTURE FOR CLINICAL &amp; SURGICAL ORCHESTRATION</text><text x="445" y="326" fill="#edf8ff" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="500" text-anchor="start" letter-spacing="0.5">Caso índice: cirugía cardiovascular compleja (CABG x3). Alcance: todas las especialidades de alta complejidad.</text><text x="4810" y="190" fill="#48d8ff" font-family="'IBM Plex Mono', Consolas, monospace" font-size="30" font-weight="800" text-anchor="end" letter-spacing="0.5">BLUEPRINT POSTER</text><text x="4810" y="236" fill="#9ebbd0" font-family="'IBM Plex Mono', Consolas, monospace" font-size="24" font-weight="500" text-anchor="end" letter-spacing="0.5">pipeline + glossary + multidomain tree</text><rect x="120" y="380" width="4720" height="170" rx="26" fill="#081c2f" fill-opacity="0.92" stroke="#48d8ff" stroke-width="3"/><text x="165" y="440" fill="#48d8ff" font-family="'IBM Plex Mono', Consolas, monospace" font-size="34" font-weight="900" text-anchor="start" letter-spacing="0.5">TESIS OPERATIVA</text><text x="165" y="496" fill="#edf8ff" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" text-anchor="start" letter-spacing="0.5">ICICSO no automatiza medicina: estructura coherencia institucional verificable, versionada, legalmente trazable y escalable a cualquier especialidad compleja.</text><text x="4770" y="496" fill="#ffc857" font-family="'IBM Plex Mono', Consolas, monospace" font-size="30" font-weight="900" text-anchor="end" letter-spacing="0.5">ANTI-ENTROPY SYSTEM</text><text x="120" y="640" fill="#48d8ff" font-family="'IBM Plex Mono', Consolas, monospace" font-size="44" font-weight="900" text-anchor="start" letter-spacing="0.5">PIPELINE CANONICO - DEL PAPER AL CASO CERRADO</text><text x="120" y="685" fill="#9ebbd0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500" text-anchor="start" letter-spacing="0.5">Cada nodo debe tener identidad, versionado, hash, dueño, entrada, salida, regla de bloqueo y dependencia explícita.</text><rect x="120" y="735" width="345" height="250" rx="20" fill="#071a2c" fill-opacity="0.94" stroke="#48d8ff" stroke-width="2"/><rect x="120" y="735" width="345" height="10" rx="5" fill="#48d8ff" fill-opacity="0.75"/><text x="144" y="780" fill="#edf8ff" font-family="'IBM Plex Mono', Consolas, monospace" font-size="31" font-weight="800" text-anchor="start" letter-spacing="0.5">SER</text><text x="144" y="813" fill="#48d8ff" font-family="'IBM Plex Mono', Consolas, monospace" font-size="19" font-weight="700">Source Evidence Record</text><text x="144" y="860" fill="#9ebbd0" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="400">Documento fuente gobernado: guía,</text><text x="144" y="887" fill="#9ebbd0" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="400">trial, revisión, consenso, norma o</text><text x="144" y="914" fill="#9ebbd0" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="400">registro. No decide. Vive en EL;</text><text x="144" y="941" fill="#9ebbd0" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="400">tiene DOI, versión, fecha,</text><text x="144" y="968" fill="#9ebbd0" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="400">metodología, dominio, hash y</text><text x="144" y="995" fill="#9ebbd0" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="400">vigencia.</text><rect x="487" y="735" width="345" height="250" rx="20" fill="#071a2c" fill-opacity="0.94" stroke="#48d8ff" stroke-width="2"/><rect x="487" y="735" width="345" height="10" rx="5" fill="#48d8ff" fill-opacity="0.75"/><text x="511" y="780" fill="#edf8ff" font-family="'IBM Plex Mono', Consolas, monospace" font-size="31" font-weight="800" text-anchor="start" letter-spacing="0.5">EO</text><text x="511" y="813" fill="#48d8ff" font-family="'IBM Plex Mono', Consolas, monospace" font-size="19" font-weight="700">Evidence Object</text><text x="511" y="860" fill="#9ebbd0" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="400">Unidad atómica derivada del SER.</text><text x="511" y="887" fill="#9ebbd0" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="400">Contiene PICO, COR, LOE, MIM,</text><text x="511" y="914" fill="#9ebbd0" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="400">outcome, población, comparador,</text><text x="511" y="941" fill="#9ebbd0" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="400">estado, hash y trazabilidad al</text><text x="511" y="968" fill="#9ebbd0" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="400">SER.</text><line x1="467" y1="860.0" x2="485" y2="860.0" stroke="#48d8ff" stroke-width="4" stroke-opacity="0.9"/><polygon points="485,860.0 469.1,868.5 469.1,851.5" fill="#48d8ff"/><rect x="854" y="735" width="345" height="250" rx="20" fill="#071a2c" fill-opacity="0.94" stroke="#ffc857" stroke-width="2"/><rect x="854" y="735" width="345" height="10" rx="5" fill="#ffc857" fill-opacity="0.75"/><text x="878" y="780" fill="#edf8ff" font-family="'IBM Plex Mono', Consolas, monospace" font-size="31" font-weight="800" text-anchor="start" letter-spacing="0.5">ECS / UCI</text><text x="878" y="813" fill="#ffc857" font-family="'IBM Plex Mono', Consolas, monospace" font-size="19" font-weight="700">Evidence Confidence Score /</text><text x="878" y="837" fill="#ffc857" font-family="'IBM Plex Mono', Consolas, monospace" font-size="19" font-weight="700">Uncertainty Confidence Index</text><text x="878" y="860" fill="#9ebbd0" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="400">ECS mide robustez estructural de</text><text x="878" y="887" fill="#9ebbd0" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="400">evidencia. UCI mide incertidumbre</text><text x="878" y="914" fill="#9ebbd0" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="400">residual. No son riesgo clínico;</text><text x="878" y="941" fill="#9ebbd0" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="400">alimentan EUL.</text><line x1="834" y1="860.0" x2="852" y2="860.0" stroke="#48d8ff" stroke-width="4" stroke-opacity="0.9"/><polygon points="852,860.0 836.1,868.5 836.1,851.5" fill="#48d8ff"/><rect x="1221" y="735" width="345" height="250" rx="20" fill="#071a2c" fill-opacity="0.94" stroke="#ffc857" stroke-width="2"/><rect x="1221" y="735" width="345" height="10" rx="5" fill="#ffc857" fill-opacity="0.75"/><text x="1245" y="780" fill="#edf8ff" font-family="'IBM Plex Mono', Consolas, monospace" font-size="31" font-weight="800" text-anchor="start" letter-spacing="0.5">MAC / DDMO</text><text x="1245" y="813" fill="#ffc857" font-family="'IBM Plex Mono', Consolas, monospace" font-size="19" font-weight="700">Contextual Applicability Matrix /</text><text x="1245" y="837" fill="#ffc857" font-family="'IBM Plex Mono', Consolas, monospace" font-size="19" font-weight="700">Data Dependencies</text><text x="1245" y="860" fill="#9ebbd0" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="400">MAC define aplicable, condicional,</text><text x="1245" y="887" fill="#9ebbd0" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="400">no aplicable o indeterminado. DDMO</text><text x="1245" y="914" fill="#9ebbd0" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="400">son datos mínimos obligatorios; si</text><text x="1245" y="941" fill="#9ebbd0" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="400">falta una crítica, se bloquea</text><text x="1245" y="968" fill="#9ebbd0" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="400">activación.</text><line x1="1201" y1="860.0" x2="1219" y2="860.0" stroke="#48d8ff" stroke-width="4" stroke-opacity="0.9"/><polygon points="1219,860.0 1203.1,868.5 1203.1,851.5" fill="#48d8ff"/><rect x="1588" y="735" width="345" height="250" rx="20" fill="#071a2c" fill-opacity="0.94" stroke="#ffc857" stroke-width="2"/><rect x="1588" y="735" width="345" height="10" rx="5" fill="#ffc857" fill-opacity="0.75"/><text x="1612" y="780" fill="#edf8ff" font-family="'IBM Plex Mono', Consolas, monospace" font-size="31" font-weight="800" text-anchor="start" letter-spacing="0.5">EUL</text><text x="1612" y="813" fill="#ffc857" font-family="'IBM Plex Mono', Consolas, monospace" font-size="19" font-weight="700">Epistemic Uncertainty Layer</text><text x="1612" y="860" fill="#9ebbd0" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="400">Clasifica fricción epistemológica</text><text x="1612" y="887" fill="#9ebbd0" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="400">I-IV. No recomienda ni ejecuta;</text><text x="1612" y="914" fill="#9ebbd0" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="400">determina validación reforzada,</text><text x="1612" y="941" fill="#9ebbd0" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="400">firmas y umbrales de escalamiento.</text><line x1="1568" y1="860.0" x2="1586" y2="86
