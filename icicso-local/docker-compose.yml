      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-replace-with-long-local-internal-service-token}
      DATABASE_URL: postgresql://${POSTGRES_USER:-icicso}:${POSTGRES_PASSWORD:-icicso-local-password}@postgres:5432/${POSTGRES_DB:-icicso_local}
      CQOI_SERVICE_PORT: ${CQOI_SERVICE_PORT:-3115}
    ports:
      - "${CQOI_SERVICE_PORT:-3115}:3115"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - icicso-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3115/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # FRONTEND
  # ============================================================================

  desktop-emulator:
    build:
      context: .
      dockerfile: apps/desktop-emulator/Dockerfile
    container_name: icicso-desktop-emulator
    environment:
      FRONTEND_HOST: 0.0.0.0
      FRONTEND_PORT: 8090
      NODE_ENV: ${NODE_ENV:-development}
      BUILD_ID: ${BUILD_ID:-dev-local}
    ports:
      - "8090:8090"
    depends_on:
      - gateway-api
    networks:
      - icicso-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # OPTIONAL: Python Semantic Terminology Engine
  # ============================================================================

  semantic-terminology-engine:
    build:
      context: engines/13_semantic_terminology_engine
      dockerfile: Dockerfile
    container_name: icicso-semantic-terminology-engine
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgresql://${POSTGRES_USER:-icicso}:${POSTGRES_PASSWORD:-icicso-local-password}@postgres:5432/${POSTGRES_DB:-icicso_local}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - icicso-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

# ============================================================================
# NETWORKS & VOLUMES
# ============================================================================

networks:
  icicso-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
