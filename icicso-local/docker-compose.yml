version: '3.8'

# ICICSO Local - Complete Docker Compose Configuration
# Includes: Infrastructure (PostgreSQL, Redis, Kafka, MinIO) + All Services
#
# Usage:
#   docker-compose up                          # Full stack
#   docker-compose up --profile infra          # Only infrastructure
#   docker-compose up --profile app            # Only applications
#   docker-compose up -d gateway-api audit-service  # Specific services

services:
  # ============================================================================
  # INFRASTRUCTURE LAYER
  # ============================================================================

  postgres:
    image: postgres:16-alpine
    container_name: icicso-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-icicso_local}
      POSTGRES_USER: ${POSTGRES_USER:-icicso}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-icicso-local-password}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-icicso} -d ${POSTGRES_DB:-icicso_local}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - icicso-network

  redis:
    image: redis:7-alpine
    container_name: icicso-redis
    ports:
      - "${REDIS_PORT:-16379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - icicso-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: icicso-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - icicso-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: icicso-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
      - "9101:9101"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - icicso-network

  minio:
    image: minio/minio:latest
    container_name: icicso-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-icicso-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-icicso-local-password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - icicso-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: icicso-pgadmin
    profiles:
      - ops
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@icicso.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-icicso-local-password}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - icicso-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: icicso-kafka-ui
    profiles:
      - ops
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    ports:
      - "8080:8080"
    depends_on:
      - kafka
      - zookeeper
    networks:
      - icicso-network

  # ============================================================================
  # APPLICATION LAYER - BLOCK 1 (Auth, Identity, Audit)
  # ============================================================================

  gateway-api:
    build:
      context: .
      dockerfile: apps/gateway-api/Dockerfile
    container_name: icicso-gateway-api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      JWT_SECRET: ${JWT_SECRET:-replace-with-long-local-jwt-secret-minimum-24-chars}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      AUTH_ISSUER: ${AUTH_ISSUER:-icicso-local-auth}
      AUTH_AUDIENCE: ${AUTH_AUDIENCE:-icicso-local-api}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-replace-with-long-local-internal-service-token}
      DATABASE_URL: postgresql://${POSTGRES_USER:-icicso}:${POSTGRES_PASSWORD:-icicso-local-password}@postgres:5432/${POSTGRES_DB:-icicso_local}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: ${MINIO_BUCKET:-icicso-block2}
      DEMO_CASE_ID: ${DEMO_CASE_ID:-CASE-CABG3-2026-00014}
      DEMO_EPISODE_ID: ${DEMO_EPISODE_ID:-EPI-ACS-2026-02-15}
      DEMO_ILC_ID: ${DEMO_ILC_ID:-ILC-MX-CIH-2026-0004821}
      GATEWAY_API_PORT: ${GATEWAY_API_PORT:-3100}
      GATEWAY_API_URL: http://gateway-api:3100
      AUTH_SERVICE_PORT: ${AUTH_SERVICE_PORT:-3101}
      AUTH_SERVICE_URL: http://auth-service:3101
      IDENTITY_SERVICE_PORT: ${IDENTITY_SERVICE_PORT:-3102}
      IDENTITY_SERVICE_URL: http://identity-service:3102
      AUDIT_SERVICE_PORT: ${AUDIT_SERVICE_PORT:-3103}
      AUDIT_SERVICE_URL: http://audit-service:3103
      EVIDENCE_LAKE_SERVICE_PORT: ${EVIDENCE_LAKE_SERVICE_PORT:-3104}
      EVIDENCE_LAKE_SERVICE_URL: http://evidence-lake-service:3104
      GHL_SERVICE_PORT: ${GHL_SERVICE_PORT:-3105}
      GHL_SERVICE_URL: http://ghl-service:3105
      KBOL_SERVICE_PORT: ${KBOL_SERVICE_PORT:-3106}
      KBOL_SERVICE_URL: http://kbol-service:3106
      STORAGE_SERVICE_PORT: ${STORAGE_SERVICE_PORT:-3107}
      STORAGE_SERVICE_URL: http://storage-service:3107
      INGESTION_SERVICE_PORT: ${INGESTION_SERVICE_PORT:-3108}
      INGESTION_SERVICE_URL: http://ingestion-service:3108
      TERMINOLOGY_SERVICE_PORT: ${TERMINOLOGY_SERVICE_PORT:-3109}
      TERMINOLOGY_SERVICE_URL: http://terminology-service:3109
      DATA_GOVERNANCE_SERVICE_PORT: ${DATA_GOVERNANCE_SERVICE_PORT:-3110}
      DATA_GOVERNANCE_SERVICE_URL: http://data-governance-service:3110
      RUNBOOK_SERVICE_PORT: ${RUNBOOK_SERVICE_PORT:-3111}
      RUNBOOK_SERVICE_URL: http://runbook-service:3111
      READINESS_SERVICE_PORT: ${READINESS_SERVICE_PORT:-3112}
