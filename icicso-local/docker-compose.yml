      CQOI_SERVICE_PORT: ${CQOI_SERVICE_PORT:-3115}
      CQOI_SERVICE_URL: http://cqoi-service:3115
    ports:
      - "${GATEWAY_API_PORT:-3100}:3100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - icicso-network
    healthcheck:
