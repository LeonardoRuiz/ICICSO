version: '3.8'

# ICICSO Local - Development Overrides
# This file adds development-specific configurations
# Usage: Docker Compose automatically merges this with docker-compose.yml
#
# Features:
#   - Source code volume mounts for hot reload
#   - Watch mode for TypeScript compilation
#   - Exposed internal ports for debugging
#   - Extended logging

services:
  gateway-api:
    volumes:
      - ./apps/gateway-api/src:/app/src
      - ./packages:/app/packages
    environment:
      NODE_ENV: development
    command: ["node", "--watch", "dist/index.js"]

  auth-service:
