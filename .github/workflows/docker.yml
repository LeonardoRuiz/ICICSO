name: Docker Build & Push

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      push_images:
        description: 'Push images to registry'
        required: false
        default: 'false'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  IMAGE_NAME: icicso

jobs:
  # ============================================================================
  # BUILD MATRIX: Build all service images
  # ============================================================================

  build-services:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway-api
          - auth-service
          - identity-service
          - audit-service
          - storage-service
          - ingestion-service
          - terminology-service
          - data-governance-service
          - evidence-lake-service
          - ghl-service
          - kbol-service
          - runbook-service
          - readiness-service
          - case-control-service
          - systemic-risk-service
          - cqoi-service
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./icicso-local
          file: ./icicso-local/apps/${{ matrix.service }}/Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Built image for ${{ matrix.service }}"

  # ============================================================================
  # BUILD FRONTEND
  # ============================================================================

  build-frontend:
    name: Build Desktop Emulator
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/desktop-emulator
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./icicso-local
          file: ./icicso-local/apps/desktop-emulator/Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # BUILD PYTHON ENGINE
  # ============================================================================

  build-python-engine:
    name: Build Semantic Terminology Engine
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/semantic-terminology-engine
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./icicso-local/engines/13_semantic_terminology_engine
          file: ./icicso-local/engines/13_semantic_terminology_engine/Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # VALIDATE DOCKERFILES
  # ============================================================================

  validate-dockerfiles:
    name: Validate Dockerfiles
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: icicso-local/apps/*/Dockerfile
          failure-threshold: warning
          ignore: DL3008,DL3009

      - name: Lint Python Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: icicso-local/engines/13_semantic_terminology_engine/Dockerfile
          failure-threshold: warning

  # ============================================================================
  # DOCKER COMPOSE VALIDATION
  # ============================================================================

  validate-compose:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: |
          docker-compose -f icicso-local/docker-compose.yml config > /dev/null
          echo "✅ docker-compose.yml is valid"

      - name: Validate docker-compose.override.yml
        run: |
          cd icicso-local
          docker-compose config > /dev/null
          echo "✅ docker-compose with overrides is valid"

  # ============================================================================
  # SUMMARY
  # ============================================================================

  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-services, build-frontend, build-python-engine, validate-dockerfiles, validate-compose]
    if: always()
    
    steps:
      - name: Check Build Status
        run: |
          if [[ "${{ needs.build-services.result }}" == "failure" || 
                "${{ needs.build-frontend.result }}" == "failure" || 
                "${{ needs.build-python-engine.result }}" == "failure" || 
                "${{ needs.validate-dockerfiles.result }}" == "failure" || 
                "${{ needs.validate-compose.result }}" == "failure" ]]; then
            echo "❌ Build Failed"
            exit 1
          fi
          echo "✅ Build Succeeded"
          echo "Built 16 Node.js services + 1 Python engine + 1 frontend"
